<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAB Ultimate Trade Calc</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #00ff00; padding: 10px; }
        .app { border: 2px solid #00ff00; max-width: 450px; margin: auto; padding: 15px; background: #111; border-radius: 10px; }
        select, button { width: 100%; padding: 10px; margin: 5px 0; background: #222; color: #00ff00; border: 1px solid #00ff00; border-radius: 5px; font-size: 14px; }
        .box { border: 1px solid #333; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        #verdict { font-size: 20px; font-weight: bold; text-align: center; padding: 15px; margin-top: 10px; border-radius: 5px; }
        .W { background: rgba(0,255,0,0.2); border: 2px solid #00ff00; }
        .L { background: rgba(255,0,0,0.2); border: 2px solid #ff0000; color: #ff0000; }
        .F { background: rgba(255,255,0,0.2); border: 2px solid #ffff00; color: #ffff00; }
        h2 { margin: 0 0 10px 0; font-size: 18px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="app">
    <h1 style="text-align:center; color:#fff; font-size:22px;">BRAINROT VALUE CHECKER</h1>
    
    <div class="box">
        <h2 style="color:#0088ff;">YOUR SIDE</h2>
        <select id="myB"></select>
        <select id="myM"></select>
        <select id="myT"></select>
    </div>

    <div class="box">
        <h2 style="color:#ffaa00;">THEIR SIDE</h2>
        <select id="theirB"></select>
        <select id="theirM"></select>
        <select id="theirT"></select>
    </div>

    <button onclick="calculate()">RUN TRADE ANALYSIS</button>
    <div id="verdict">Awaiting input...</div>
</div>

<script>
// 2026 VALUATION DATABASE
const DATA = {
    units: {
        "Strawberry Elephant": 500000000000, "Dragon Gingerini": 300000000000, "Skibidi Toilet (OG)": 300000000000,
        "Meowl": 275000000000, "Headless Horseman": 150000000000, "Las Spyderinis": 250000000,
        "Dragon Cannelloni": 100000000000, "Spaghetti Tualetti": 600000000, "Chicleteira Bicicleteira": 750000000,
        "Garama & Madundung": 50000000, "Ketchuru & Masturu": 42500000, "Belula Beluga": 60000000,
        "Piccionetta Macchina": 47000000, "Sigma Boy": 325000, "Sigma Girl": 340000,
        "Tric Trac Baraboom": 9000, "Pipi Avocado": 9500, "Noobini Pizzanini": 25, "67": 10
    },
    mutations: {
        "None": 1, "Lucky": 10, "Divine": 10, "Cursed": 9, "Radioactive": 8.5, "Galaxy": 7,
        "Lava": 6, "Candy": 4, "Blood": 2, "Diamond": 1.5, "Gold": 1.25, "Sleepy": 0.5
    },
    traits: {
        "None": 1, "Strawberry": 8, "Fire": 6, "Nyan Cat": 6, "2026": 6, "Fireworks": 6,
        "Spider": 4.5, "Halloween": 4.5, "10B": 4, "UFO": 3, "Taco": 3, "Rain": 2.5
    }
};

function init() {
    const sides = ['my', 'their'];
    sides.forEach(s => {
        const b = document.getElementById(s + 'B');
        const m = document.getElementById(s + 'M');
        const t = document.getElementById(s + 'T');
        Object.keys(DATA.units).sort().forEach(u => b.add(new Option(u, u)));
        Object.keys(DATA.mutations).forEach(mu => m.add(new Option(mu, mu)));
        Object.keys(DATA.traits).forEach(tr => t.add(new Option(tr, tr)));
    });
}

function calculate() {
    const val = (s) => {
        let b = DATA.units[document.getElementById(s + 'B').value];
        let m = DATA.mutations[document.getElementById(s + 'M').value];
        let t = DATA.traits[document.getElementById(s + 'T').value];
        return b * m * t;
    };

    let myTotal = val('my');
    let theirTotal = val('their');
    let v = document.getElementById('verdict');
    let ratio = theirTotal / myTotal;

    if (ratio >= 1.2) { v.className = "W"; v.innerText = "WIN (W) - Take it!"; }
    else if (ratio >= 0.9) { v.className = "F"; v.innerText = "FAIR (F) - Safe trade."; }
    else { v.className = "L"; v.innerText = "LOSS (L) - Don't do it!"; }

    v.innerHTML += `<br><small style="font-size:12px; color:#aaa;"> Worth Diff: $${(theirTotal - myTotal).toLocaleString()}</small>`;
}
init();
</script>
</body>
</html>
